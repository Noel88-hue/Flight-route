{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-5">
            <h3 class="mb-4 text-center" style="color: #2c3e50; font-weight: 700;">Add New Route</h3>
            <form method="post">
                {% csrf_token %}
                <div class="mb-4 d-flex flex-column gap-3">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn btn-primary w-100">Add Route ✈️</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
